name: savorlean_mobile
description: "SavorLean — fresh diet meal-plan delivery app for Pakistan."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Backend: Supabase handles auth, database, and storage.
  supabase_flutter: ^2.9.0

  # Google Sign-In (wired through Supabase OAuth).
  google_sign_in: ^7.2.0

  # State management: Riverpod with code-generation annotations.
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Navigation: go_router for declarative routing and deep-link support.
  go_router: ^17.2.3

  # Fonts: Inter (body/UI) and Cormorant Garamond (serif headings).
  google_fonts: ^8.1.0

  # Image caching: stores remote Supabase Storage URLs to disk.
  cached_network_image: ^3.4.1

  # SVG icon support (used for Lucide-style icon assets).
  flutter_svg: ^2.0.10+1

  # Toast / snackbar notifications for user feedback.
  fluttertoast: ^9.0.0

  # Keeps the native splash screen visible until Supabase has initialised.
  flutter_native_splash: ^2.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation: required by riverpod_annotation to produce providers.
  build_runner: ^2.4.15
  riverpod_generator: ^4.0.3

  # Mocking library for unit tests (mocks the Supabase client).
  mocktail: ^1.0.4

  # Generates all launcher icon sizes from a single source PNG.
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

# ── Launcher icon configuration ─────────────────────────────────────────────
# Run: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  # Adaptive icon (Android 8+): white background + the logo as foreground.
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/icon.png"
  remove_alpha_ios: true

# ── Native splash screen configuration ──────────────────────────────────────
# Run: dart run flutter_native_splash:create
flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/icon/icon.png"
  android: true
  ios: true
  # Android 12+ uses its own splash system with the adaptive icon.
  android_12:
    image: "assets/icon/icon.png"
    icon_background_color: "#FFFFFF"
    color: "#FFFFFF"
